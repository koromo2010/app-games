name: Production smoke monitor

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/production-smoke.yml
      - scripts/production-smoke.mjs
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-smoke-monitor
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check production lobby
        run: node scripts/production-smoke.mjs
