name: Generate Tahoiya candidate catalog

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/generate-tahoiya-candidates.yml
      - scripts/generate-tahoiya-candidates.ts
      - lib/tahoiya-source-library.ts
  workflow_dispatch:
    inputs:
      target_total:
        description: Total accepted candidates to keep in the catalog
        required: true
        default: "100"
      max_batches:
        description: Maximum 10-word AI review batches in this run
        required: true
        default: "80"

permissions:
  contents: write

concurrency:
  group: tahoiya-candidate-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate and review candidates
        run: npm run tahoiya:generate -- --target=${{ inputs.target_total || '100' }} --max-batches=${{ inputs.max_batches || '80' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAHOIYA_GENERATOR_MODEL: ${{ vars.TAHOIYA_GENERATOR_MODEL }}

      - name: Commit generated catalog
        shell: bash
        run: |
          if git diff --quiet -- data/tahoiya-candidates.json; then
            echo "No new candidates were generated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tahoiya-candidates.json
          git commit -m "Generate Tahoiya candidate catalog"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
