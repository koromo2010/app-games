name: app-games-word-db

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-bookworm
    environment:
      POSTGRES_DB: ${WORD_DB_NAME}
      POSTGRES_USER: ${WORD_DB_USER}
      POSTGRES_PASSWORD: ${WORD_DB_PASSWORD}
    ports:
      - "127.0.0.1:${WORD_DB_PORT:-5432}:5432"
    volumes:
      - word-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  word-db-data:
