<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ゲーム固有プレビュー</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- このファイルは外側のGame Fields Shellへ差し込まれます。共通ヘッダー、広場、部屋、参加者、ルール、デバッグUIを追加しないでください。 -->
    <main id="game-slot" data-game-slot>
      <section class="game-board" aria-labelledby="game-title">
        <p class="eyebrow">GAME-SPECIFIC UI</p>
        <h1 id="game-title">新しいゲーム</h1>
        <p class="game-status" data-game-status>ゲーム開始前です</p>
        <div class="game-actions" aria-label="ゲーム固有の操作">
          <button type="button" data-game-action="primary">ゲーム固有操作</button>
        </div>
      </section>
    </main>
    <div id="game-toast" role="status" aria-live="polite"></div>
    <script src="./mock.js"></script>
  </body>
</html>
